# ============================================================
# File: application.properties
# Module: Application Configuration
#
# Responsibility:
# Defines the runtime configuration for the QA Store API.
#
# Interaction:
# Spring Boot reads this file during startup to configure the
# application name, HTTP server and database connection.
#
# Engineering Principles:
# - Externalized configuration.
# - Environment-based configuration readiness.
# - Clear runtime defaults for local development.
# ============================================================

spring.application.name=qa-store-api
server.port=8080

# ============================================================
# MySQL Database Configuration
# ============================================================

spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:qa_store_db}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================================
# JPA / Hibernate Configuration
# ============================================================

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ============================================================
# OpenAPI / Swagger UI Configuration
# ============================================================
# Exposes the OpenAPI JSON contract.
springdoc.api-docs.path=/v3/api-docs

# Exposes Swagger UI in a short and friendly URL.
springdoc.swagger-ui.path=/swagger-ui.html

# Sorts API operations by HTTP method for easier reading.
springdoc.swagger-ui.operations-sorter=method

# Sorts tags alphabetically.
springdoc.swagger-ui.tags-sorter=alpha

# ============================================================
# JWT Configuration
# ============================================================
# JWT_SECRET must be a Base64-encoded secret with enough entropy.
# Do not commit real production secrets to the repository.
app.jwt.secret=${JWT_SECRET}

# Token expiration time in milliseconds.
# 3600000 ms = 1 hour.
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}